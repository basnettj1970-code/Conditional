<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Si + imparfait → conditionnel | Quiz</title>

  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#0f1b36;
      --card: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.14);
      --text:#eaf0ff;
      --muted:#b8c4e6;
      --accent:#7aa2ff;
      --good:#34d399;
      --bad:#fb7185;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background:
        radial-gradient(1100px 650px at 15% 0%, #1b2f66 0%, var(--bg2) 48%, var(--bg1) 100%);
      padding: 28px 16px 40px;
    }

    .wrap{ max-width: 980px; margin: 0 auto; }

    .header{
      display:flex;
      gap:16px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom: 16px;
    }

    .titleBox{
      flex:1 1 560px;
      padding: 18px 18px 16px;
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    h1{ margin: 0 0 8px; font-size: clamp(24px, 3vw, 36px); letter-spacing: .2px; }
    .subtitle{ margin:0 0 12px; color:var(--muted); line-height:1.35; }

    .pillRow{ display:flex; flex-wrap:wrap; gap:8px; }
    .pill{
      padding: 6px 10px;
      border-radius:999px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--muted);
    }

    .controls{
      flex:0 1 340px;
      padding: 18px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .btnRow{ display:flex; gap:10px; flex-wrap:wrap; }

    button{
      appearance:none;
      border:1px solid rgba(122,162,255,.55);
      background: linear-gradient(180deg, rgba(122,162,255,.28), rgba(122,162,255,.12));
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 750;
      cursor:pointer;
      transition: transform .05s ease, border-color .15s ease, opacity .15s ease;
      flex:1 1 auto;
      min-width: 150px;
    }
    button:active{ transform: translateY(1px); }
    button:hover{ border-color: rgba(122,162,255,.9); }

    button.secondary{
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      font-weight: 700;
      min-width: 150px;
    }
    button.ghost{
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.12);
      min-width: 150px;
    }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    .toggle{
      display:flex;
      align-items:center;
      gap:10px;
      color: var(--muted);
      font-size: 14px;
      user-select:none;
    }
    .toggle input{ transform: translateY(1px); }

    .score{ margin: 6px 0 0; font-size: 18px; font-weight: 850; }
    .note{ margin:0; color: var(--muted); font-size: 13px; line-height:1.35; }

    .banner{
      display:none;
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(52,211,153,.35);
      background: rgba(52,211,153,.10);
      color: var(--good);
      font-weight: 750;
    }
    .banner.show{ display:block; }

    .quiz{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .card{
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      border-radius: 18px;
      padding: 14px 14px 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.20);
    }
    .qline{ margin:0 0 10px; font-weight: 750; }

    .inputs{ display:flex; flex-wrap:wrap; gap: 10px; }
    input[type="text"]{
      width: 210px;
      max-width: 100%;
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline:none;
      font-size: 16px;
    }
    input[type="text"]:focus{
      border-color: rgba(122,162,255,.9);
      box-shadow: 0 0 0 3px rgba(122,162,255,.18);
    }

    .row{
      margin-top: 10px;
      display:flex;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.05);
      color: var(--muted);
    }
    .tag.good{
      color: var(--good);
      border-color: rgba(52,211,153,.35);
      background: rgba(52,211,153,.10);
    }
    .tag.bad{
      color: var(--bad);
      border-color: rgba(251,113,133,.35);
      background: rgba(251,113,133,.10);
    }

    .answer{ display:none; color: #d7e3ff; font-size: 14px; opacity:.95; }
    .answer.show{ display:block; }

    details{
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(255,255,255,.05);
    }
    summary{ cursor:pointer; color: var(--accent); font-weight: 800; }
    .rule{ color: var(--muted); margin: 10px 0 0; line-height:1.45; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <section class="titleBox">
        <h1>Si + imparfait ➜ conditionnel</h1>
        <p class="subtitle">Complète les phrases (gap-fill). Parfois, la proposition en <strong>si</strong> vient en deuxième.</p>
        <div class="pillRow">
          <span class="pill">Imparfait après “si”</span>
          <span class="pill">Conditionnel dans la conséquence</span>
          <span class="pill">Ordre mélangé</span>
          <span class="pill">Nouvelle série automatique</span>
        </div>
      </section>

      <aside class="controls">
        <div class="btnRow">
          <button id="checkBtn">Vérifier</button>
          <button id="newSetBtn" class="ghost">Nouvelle série</button>
          <button id="resetBtn" class="secondary">Effacer</button>
        </div>

        <label class="toggle">
          <input type="checkbox" id="showAnswersToggle">
          Afficher les corrections
