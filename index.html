<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Si clauses – futur et conditionnel</title>

<style>
body{
  font-family: system-ui, Arial, sans-serif;
  background:#f4f6fb;
  margin:0;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
}
h1{ margin-top:0; color:#2b4eff; }
.card{
  border:1px solid #dde3f6;
  border-radius:10px;
  padding:12px;
  margin:12px 0;
}
.inputs input{
  width:180px;
  padding:8px;
  margin-right:8px;
}
button{
  padding:10px 14px;
  border-radius:8px;
  border:1px solid #2b4eff;
  background:#2b4eff;
  color:white;
  font-weight:600;
  cursor:pointer;
}
button.secondary{
  background:white;
  color:#2b4eff;
}
.tag{ font-weight:600; }
.good{ color:green; }
.bad{ color:#b00020; }
.answer{ display:none; margin-top:6px; }
.answer.show{ display:block; }
#accentBar button{
  margin:2px;
  padding:6px 10px;
}
.hidden{ display:none; }
</style>
</head>

<body>
<div class="container">
<h1>Si clauses – futur et conditionnel</h1>
<p>Complète les phrases avec la bonne forme du verbe. Observe bien les indices de temps.</p>

<label>
  Niveau :
  <select id="level">
    <option value="futur">Niveau 1 – si + présent → futur</option>
    <option value="cond">Niveau 2 – si + imparfait → conditionnel</option>
    <option value="mix">Niveau 3 – mixte (indices de temps)</option>
  </select>
</label>

<div id="quiz"></div>

<button id="checkBtn">Soumettre</button>
<button id="newBtn" class="secondary">Nouvelle série</button>

<div id="showWrap" class="hidden">
  <label><input type="checkbox" id="showAnswers"> Voir les corrections</label>
</div>

<p id="score"></p>

<div id="accentBar">
  <strong>Accents:</strong>
  <button data-a="é">é</button>
  <button data-a="è">è</button>
  <button data-a="ê">ê</button>
  <button data-a="à">à</button>
  <button data-a="ç">ç</button>
  <button data-a="ù">ù</button>
  <button data-a="ô">ô</button>
  <button data-a="ï">ï</button>
</div>
</div>

<script>
// ================= QUESTION BANKS =================

// Niveau 1 – présent → futur
const FUTUR = [
 {s:"Si tu _____ (finir) tes devoirs, tu _____ (sortir) demain.", a:["finis","sortiras"]},
 {s:"Si je _____ (avoir) le temps ce soir, je _____ (regarder) un film.", a:["ai","regarderai"]},
 {s:"Nous _____ (aller) à la plage si il _____ (faire) beau.", a:["irons","fait"]},
 {s:"Ils _____ (réussir) si ils _____ (travailler) sérieusement.", a:["réussiront","travaillent"]}
];

// Niveau 2 – imparfait → conditionnel
const CONDITIONNEL = [
 {s:"Si j'_____ (avoir) plus d'argent, je _____ (voyager).", a:["avais","voyagerais"]},
 {s:"Nous _____ (acheter) une maison si nous _____ (être) riches.", a:["achèterions","étions"]},
 {s:"Si tu _____ (pouvoir), tu _____ (aider) tes parents.", a:["pouvais","aiderais"]},
 {s:"Je _____ (changer) de travail si j'_____ (avoir) le choix.", a:["changerais","avais"]}
];

// Niveau 3 – mixte, indices + phrases partiellement complétées
const MIXED = [
 {s:"Si je gagne à la loterie, je _____ (acheter) une grande maison.", a:["acheterai"], inputs:1},
 {s:"Si j'_____ (avoir) plus de temps, je voyagerais davantage.", a:["avais"], inputs:1},
 {s:"Si tu travailles bien, tu _____ (réussir) demain.", a:["réussiras"], inputs:1},
 {s:"Si nous étions moins fatigués, nous _____ (sortir) plus ce soir.", a:["sortirions"], inputs:1},
 {s:"Si je _____ (finir) mes devoirs ce soir, je regarderai un film.", a:["finis"], inputs:1}
];

// ================= LOGIC =================

let current=[];
let lastInput=null;
const quiz=document.getElementById("quiz");

function pickSet(){
  const lvl=document.getElementById("level").value;
  let bank=FUTUR;
  if(lvl==="cond") bank=CONDITIONNEL;
  if(lvl==="mix") bank=MIXED;
  current=[...bank].sort(()=>Math.random()-0.5).slice(0,4);
}

function render(){
  document.getElementById("showWrap").classList.add("hidden");
  quiz.innerHTML="";

  current.forEach((q,i)=>{
    const blanks=q.inputs||2;
    let inputsHTML="";
    for(let n=0;n<blanks;n++){
      inputsHTML+=`<input data-q="${i}" data-a="${n}"> `;
    }
    quiz.innerHTML+=`
      <div class="card">
        <p>${i+1}. ${q.s}</p>
        <div class="inputs">${inputsHTML}</div>
        <div class="tag" id="tag-${i}"></div>
        <div class="answer" id="ans-${i}">✅ ${q.a.join(" / ")}</div>
      </div>`;
  });

  quiz.querySelectorAll("input").forEach(i=>i.onfocus=()=>lastInput=i);
}

function check(){
  let score=0;
  document.getElementById("showWrap").classList.remove("hidden");

  current.forEach((q,i)=>{
    const ok=q.a.every((ans,n)=>{
      const user=quiz.querySelector(`[data-q="${i}"][data-a="${n}"]`).value
        .trim().toLowerCase();
      return user===ans;
    });

    document.getElementById(`tag-${i}`).innerHTML =
      ok ? "<span class='good'>Correct</span>" : "<span class='bad'>À corriger</span>";

    if(ok) score++;
  });

  document.getElementById("score").innerText=`Score : ${score} / ${current.length}`;
}

document.getElementById("checkBtn").onclick=check;
document.getElementById("newBtn").onclick=()=>{ pickSet(); render(); };
document.getElementById("showAnswers").onchange=e=>{
  current.forEach((_,i)=>document.getElementById(`ans-${i}`).classList.toggle("show",e.target.checked));
};
document.getElementById("level").onchange=()=>{ pickSet(); render(); };

document.querySelectorAll("#accentBar button").forEach(b=>{
  b.onclick=()=>{ if(lastInput){ lastInput.value+=b.dataset.a; lastInput.focus(); } };
});

pickSet();
render();
</script>
</body>
</html>
