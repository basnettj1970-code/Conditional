<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Si clauses – Conditional & Future</title>

<style>
body{
  font-family: system-ui, Arial, sans-serif;
  background:#f4f6fb;
  margin:0;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
}
h1{ margin-top:0; color:#2b4eff; }
.card{
  border:1px solid #dde3f6;
  border-radius:10px;
  padding:12px;
  margin:12px 0;
}
.inputs input{
  width:180px;
  padding:8px;
  margin-right:8px;
}
button{
  padding:10px 14px;
  border-radius:8px;
  border:1px solid #2b4eff;
  background:#2b4eff;
  color:white;
  font-weight:600;
  cursor:pointer;
}
button.secondary{
  background:white;
  color:#2b4eff;
}
.tag{ font-weight:600; }
.good{ color:green; }
.bad{ color:#b00020; }
.answer{ display:none; margin-top:6px; }
.answer.show{ display:block; }
#accentBar button{
  margin:2px;
  padding:6px 10px;
}
.hidden{ display:none; }
</style>
</head>

<body>
<div class="container">
<h1>Si clauses – conditionnel & futur</h1>
<p>Complète les phrases avec la bonne forme du verbe. Attention aux accents.</p>

<label>
  Niveau :
  <select id="level">
    <option value="easy">Niveau 1 – conditionnel</option>
    <option value="hard">Niveau 2 – futur / conditionnel</option>
  </select>
</label>

<div id="quiz"></div>

<button id="checkBtn">Soumettre</button>
<button id="newBtn" class="secondary">Nouvelle série</button>

<div id="showWrap" class="hidden">
  <label><input type="checkbox" id="showAnswers"> Voir les corrections</label>
</div>

<p id="score"></p>

<div id="accentBar">
  <strong>Accents:</strong>
  <button data-a="é">é</button>
  <button data-a="è">è</button>
  <button data-a="ê">ê</button>
  <button data-a="à">à</button>
  <button data-a="ç">ç</button>
  <button data-a="ù">ù</button>
  <button data-a="ô">ô</button>
  <button data-a="ï">ï</button>
</div>

</div>

<script>
const EASY = [
 {s:"Si j'_____ (avoir) le temps, je _____ (voyager) plus.", a:["avais","voyagerais"]},
 {s:"Je _____ (acheter) une maison si j'_____ (être) riche.", a:["achèterais","étais"]},
 {s:"Si nous _____ (pouvoir) choisir, nous _____ (partir) demain.", a:["pouvions","partirions"]},
 {s:"Ils _____ (réussir) si ils _____ (travailler) plus.", a:["réussiraient","travaillaient"]}
];

const HARD = [
 // conditionnel
 {s:"Si j'_____ (avoir) plus d'argent, je _____ (changer) de voiture.", a:["avais","changerais"]},
 {s:"Je _____ (aider) mes parents si je _____ (pouvoir).", a:["aiderais","pouvais"]},

 // futur
 {s:"Si tu _____ (finir) tes devoirs ce soir, tu _____ (sortir) demain.", a:["finis","sortiras"]},
 {s:"Nous _____ (aller) à Paris si le train _____ (partir) à l'heure.", a:["irons","part"]},

 // mixed order
 {s:"Tu _____ (réussir) ton examen si tu _____ (travailler) sérieusement.", a:["réussiras","travailles"]},
 {s:"Je _____ (voyager) plus si j'_____ (avoir) le temps.", a:["voyagerais","avais"]}
];

let current=[];
let lastInput=null;
let submitted=false;

const quiz=document.getElementById("quiz");

function pickSet(){
  const bank=document.getElementById("level").value==="easy"?EASY:HARD;
  current=[...bank].sort(()=>Math.random()-0.5).slice(0,4);
}

function render(){
  submitted=false;
  document.getElementById("showWrap").classList.add("hidden");
  quiz.innerHTML="";
  current.forEach((q,i)=>{
    quiz.innerHTML+=`
      <div class="card">
        <p>${i+1}. ${q.s}</p>
        <div class="inputs">
          <input data-q="${i}" data-a="0">
          <input data-q="${i}" data-a="1">
        </div>
        <div class="tag" id="tag-${i}"></div>
        <div class="answer" id="ans-${i}">✅ ${q.a[0]} / ${q.a[1]}</div>
      </div>`;
  });
  quiz.querySelectorAll("input").forEach(i=>i.onfocus=()=>lastInput=i);
}

function check(){
  let score=0;
  submitted=true;
  document.getElementById("showWrap").classList.remove("hidden");

  current.forEach((q,i)=>{
    const u0=quiz.querySelector(`[data-q="${i}"][data-a="0"]`).value.trim().toLowerCase();
    const u1=quiz.querySelector(`[data-q="${i}"][data-a="1"]`).value.trim().toLowerCase();
    const ok=u0===q.a[0] && u1===q.a[1];
    document.getElementById(`tag-${i}`).innerHTML=ok?"<span class='good'>Correct</span>":"<span class='bad'>À corriger</span>";
    if(ok) score++;
  });
  document.getElementById("score").innerText=`Score : ${score} / ${current.length}`;
  if(score===current.length){ pickSet(); render(); }
}

document.getElementById("checkBtn").onclick=check;
document.getElementById("newBtn").onclick=()=>{ pickSet(); render(); };
document.getElementById("showAnswers").onchange=e=>{
  current.forEach((_,i)=>document.getElementById(`ans-${i}`).classList.toggle("show",e.target.checked));
};

document.querySelectorAll("#accentBar button").forEach(b=>{
  b.onclick=()=>{ if(lastInput){ lastInput.value+=b.dataset.a; lastInput.focus(); } };
});

document.getElementById("level").onchange=()=>{ pickSet(); render(); };

pickSet();
render();
</script>
</body>
</html>
